version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: micronature-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_DATABASE=${DB_DATABASE}
      - JWT_SECRET=${JWT_SECRET:-micronature_jwt_secret_key_2026}
      # Pass through or define optional Gemini and model settings if available in host env
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - MODEL_API_KEY=${MODEL_API_KEY}
      - MODEL_BASE_URL=${MODEL_BASE_URL}
      - MODEL_NAME=${MODEL_NAME}
    restart: always
